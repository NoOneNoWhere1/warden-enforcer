# CI workflow for the Warden enforcer and clearing service.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go enforcer ────────────────────────────────────────────────────────────
  go:
    name: Go — enforcer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enforcer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: enforcer/go.mod
          cache-dependency-path: enforcer/go.sum

      # Bug-parity quirks carried from the Rust implementation are marked
      # `// PARITY:` in source. Deleting one silently un-documents a quirk;
      # this guard fails the build if the markers disappear.
      - name: PARITY markers present
        run: grep -rq "// PARITY:" internal/ cmd/

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: enforcer

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race ./...

  # ── Python — compose + clearing unit tests ────────────────────────────────
  python:
    name: Python — clearing unit tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: warden
      POSTGRES_PORT: 5433
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Start compose services
        run: docker compose -f infra/compose.yml up -d postgres
        env:
          POSTGRES_PASSWORD: warden

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            docker compose -f infra/compose.yml exec -T postgres pg_isready -U postgres && break
            sleep 2
          done
        env:
          POSTGRES_PASSWORD: warden

      - name: Clearing unit tests
        run: python -m pytest tests/phase5/ -v -m "not linux_only"

  # ── Linux gate — network isolation ───────────────────────────────────────────
  # Requires real Linux kernel: nftables, network namespaces. Runs the
  # enforcer binary built from source; needs root for nftables. The gate runs
  # the real binary and fails on any test failure — no exit-5 green-by-skip
  # tolerance. Both the auth tests (test_api_auth.py) and the nftables
  # tests (test_nftables.py) pass against the Go LinuxSandbox backend.
  linux-gate:
    name: Linux gate — network isolation
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: enforcer/go.mod
          cache-dependency-path: enforcer/go.sum

      - name: Build enforcer
        run: go build -o bin/warden-enforcer ./cmd/warden-enforcer
        working-directory: enforcer

      - name: Verify gate binary was built
        run: test -x enforcer/bin/warden-enforcer

      - name: Install kernel tools
        run: sudo apt-get install -y nftables iproute2 iputils-ping

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      # Real Rekor for the breach-attestation gate — no stub: the gate verifies
      # the full rekord + Ed25519 second-signature path. Profiled so only the
      # gate pulls this 5-container stack. POSTGRES_PASSWORD is
      # compose-interpolation ballast: the file's postgres service requires it
      # even though the gate never starts it.
      - name: Start Rekor transparency log
        run: docker compose -f infra/compose.yml --profile gate up -d rekor-server
        env:
          POSTGRES_PASSWORD: unused

      - name: Wait for Rekor
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/ping && echo && break
            sleep 2
          done
          curl -fsS http://localhost:3000/ping

      - name: Start postgres
        run: docker compose -f infra/compose.yml up -d postgres
        env:
          POSTGRES_PASSWORD: warden

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            docker compose -f infra/compose.yml exec -T postgres pg_isready -U postgres && break
            sleep 2
          done
        env:
          POSTGRES_PASSWORD: warden

      - name: Enforcement gate tests
        # Use the setup-python interpreter explicitly: `sudo python` would pick
        # the system Python, which lacks the installed test deps. The enforcer
        # binary is given an ephemeral signing key by the test fixture;
        # ENFORCER_REKOR_URL routes its attestations to the Rekor above.
        run: |
          PYTHON="$(command -v python)"
          sudo -E ENFORCER_REKOR_URL=http://localhost:3000 "$PYTHON" -m pytest tests/phase1/ -v -m linux_only
        shell: bash

      - name: Clearing gate tests
        run: |
          PYTHON="$(command -v python)"
          sudo -E ENFORCER_REKOR_URL=http://localhost:3000 POSTGRES_PASSWORD=warden "$PYTHON" -m pytest tests/phase5/ -v -m linux_only
        shell: bash

      # Narrated end-to-end demo of the same enforcement path the gate asserts.
      # Runs the real binary against the real Rekor above; exit 0 only if every
      # stage passes, so this also guards the demo against bit-rot. Uses the
      # setup-python interpreter (system python lacks the cryptography dep).
      - name: Rogue-agent demo (end-to-end)
        run: |
          PYTHON="$(command -v python)"
          sudo -E ENFORCER_REKOR_URL=http://localhost:3000 POSTGRES_PASSWORD=warden ENFORCER_BIN="$PWD/enforcer/bin/warden-enforcer" "$PYTHON" demo/run_demo.py
        shell: bash

      - name: Rekor logs on failure
        if: failure()
        run: docker compose -f infra/compose.yml --profile gate logs rekor-server
        env:
          POSTGRES_PASSWORD: unused
